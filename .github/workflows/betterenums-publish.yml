name: YACL.BetterEnum.Publish

on:
  push:
    branches:
      - main
    
    paths:
      - 'src/BetterEnums/**'
      - '.github/workflows/betterenums-publish.yml'

permissions:
     id-token: write
     contents: write
     
jobs:
  publish:
    
    runs-on: ubuntu-latest
    
    steps:
      - name: Debug GitHub Context
        run: |
            echo "REPOSITORY=$GITHUB_REPOSITORY"
            echo "WORKFLOW=$GITHUB_WORKFLOW"
            echo "WORKFLOW_REF=$GITHUB_WORKFLOW_REF"
            echo "REF=$GITHUB_REF"

      - name: Publish to NuGet
        uses: juliancamits-tech/YACL/.github/workflows/nuget-publish.yml@main
        with:
          project_path: ./src/BetterEnums/YACL.BetterEnums.Abstractions/YACL.BetterEnums.Abstractions.csproj
          package_id: YACL.BetterEnums
          run_tests: false
          test_project_path: ""
